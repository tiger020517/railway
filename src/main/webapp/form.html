<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>지원서 작성</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5" style="max-width: 600px;">
    <h2 class="mb-4">📝 장기 기증 지원서</h2>
    <form action="write_ok.jsp" method="post">
        <div class="mb-3">
            <label class="form-label">이름</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">희망 장기</label>
            <select name="organ" class="form-select">
                <option value="신장">신장</option>
                <option value="간">간</option>
                <option value="심장">심장</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">연락처</label>
            <input type="text" name="contact" class="form-control" placeholder="010-0000-0000">
        </div>
        <button type="submit" class="btn btn-success w-100">제출하기</button>
    </form>
</div>
</body>
</html>
